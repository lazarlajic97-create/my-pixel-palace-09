<!DOCTYPE html>

<style>
        /* Custom styles for specific glowing effects and scrollbars not easily achievable with basic Tailwind utilities */
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .glass-panel {
            background-color: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .input-glow:focus-within {
            box-shadow: inset 0 0 0 2px rgba(37, 99, 235, 0.5), 0 0 10px rgba(6, 182, 212, 0.2);
        }
        .radial-glow-bg {
            background: radial-gradient(circle at top right, rgba(37, 99, 235, 0.15), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(6, 182, 212, 0.1), transparent 40%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col radial-glow-bg relative overflow-x-hidden">
<!-- Transactional Screen: Navigation elements suppressed -->
<!-- Top Action Bar (Back) -->
<header class="sticky top-0 z-40 w-full px-container-margin py-md flex items-center justify-between bg-background/80 backdrop-blur-md border-b border-white/5">
<button aria-label="Zurück" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/5 active:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-on-surface" style="font-variation-settings: 'wght' 300;">arrow_back</span>
</button>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Schritt 2 von 3</span>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-container-margin py-lg flex flex-col pb-32">
<!-- Page Title -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background mb-lg">Buchungsdetails</h1>
<!-- Event Summary Card (Glassmorphism) -->
<div class="glass-panel rounded-xl p-md mb-lg flex gap-md items-center">
<div class="w-16 h-16 rounded-lg overflow-hidden shrink-0 border border-white/10 relative">
<img alt="Event Thumbnail" class="w-full h-full object-cover" data-alt="A close-up view of a sleek, minimalist digital calendar interface showing an upcoming meeting. The scene is bathed in dark mode lighting with a subtle cool blue and vibrant cyan (#06b6d4) atmospheric glow. The composition focuses on a specific time slot, rendered in crisp typography against a deep navy background, conveying a sense of precise, automated scheduling in a premium B2B software environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD31jvr8wEdEpVot3Wp-vfqSqLtmG-Vg2J-pFXH458ctn2yXUU9TZRD4Xad4dWpaZMVKwpwBoVdxfdf4KtYym2RH0ccrXwVhcopFN1xpEgJR9qS-n4T5QqKJwAIcNBuruBBuMS93SqPTrS90iV1h3yyaGgYSMB45xf855FsJhu5arwN6MwRtIv99QRCmpfZK-cZdHPXlc71mBr4Ujta2_yusOzDYOfxeIudcjS4mQcGEwpo-en_0iEsfh52vh8dYb8-ZtJO33l8cJtb"/>
<div class="absolute inset-0 bg-primary-container/20 mix-blend-overlay"></div>
</div>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-secondary mb-xs uppercase tracking-wider">Discovery Call</span>
<span class="font-body-md text-body-md text-on-surface mb-xs flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">calendar_today</span>
                    14. Nov 2024, 10:00 Uhr
                </span>
<span class="font-body-md text-body-md text-on-surface-variant flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">schedule</span>
                    30 Minuten
                </span>
</div>
</div>
<!-- Single Column Form -->
<form class="flex flex-col gap-md">
<!-- Vorname -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider pl-xs" for="vorname">Vorname <span class="text-error">*</span></label>
<div class="relative input-glow rounded-lg transition-shadow duration-300">
<input class="w-full h-14 bg-surface-container border border-outline-variant/30 rounded-lg px-md font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary-container transition-colors" id="vorname" name="vorname" placeholder="Dein Vorname" required="" type="text"/>
</div>
</div>
<!-- Nachname -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider pl-xs" for="nachname">Nachname <span class="text-error">*</span></label>
<div class="relative input-glow rounded-lg transition-shadow duration-300">
<input class="w-full h-14 bg-surface-container border border-outline-variant/30 rounded-lg px-md font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary-container transition-colors" id="nachname" name="nachname" placeholder="Dein Nachname" required="" type="text"/>
</div>
</div>
<!-- E-Mail -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider pl-xs" for="email">E-Mail Adresse <span class="text-error">*</span></label>
<div class="relative input-glow rounded-lg transition-shadow duration-300">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant">mail</span>
<input class="w-full h-14 bg-surface-container border border-outline-variant/30 rounded-lg pl-12 pr-md font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary-container transition-colors" id="email" name="email" placeholder="name@unternehmen.de" required="" type="email"/>
</div>
</div>
<!-- Telefon (Optional) -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider pl-xs" for="telefon">Telefonnummer <span class="text-on-surface-variant/50 lowercase normal-case">(optional)</span></label>
<div class="relative input-glow rounded-lg transition-shadow duration-300">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant">call</span>
<input class="w-full h-14 bg-surface-container border border-outline-variant/30 rounded-lg pl-12 pr-md font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary-container transition-colors" id="telefon" name="telefon" placeholder="+49 123 456789" type="tel"/>
</div>
</div>
<!-- Notizen -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider pl-xs" for="notizen">Thema / Notizen</label>
<div class="relative input-glow rounded-lg transition-shadow duration-300">
<textarea class="w-full bg-surface-container border border-outline-variant/30 rounded-lg p-md font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary-container transition-colors resize-none" id="notizen" name="notizen" placeholder="Worum soll es in unserem Termin gehen?" rows="4"></textarea>
</div>
</div>
</form>
</main>
<!-- Sticky Bottom CTA (Finger-friendly) -->
<div class="fixed bottom-0 left-0 w-full px-container-margin py-lg bg-gradient-to-t from-background via-background/90 to-transparent z-50">
<button class="w-full h-14 bg-primary-container text-white font-label-md text-label-md uppercase tracking-widest rounded-xl flex items-center justify-center gap-sm active:scale-[0.98] transition-all duration-200 shadow-[0_4px_20px_rgba(37,99,235,0.4)] hover:shadow-[0_4px_25px_rgba(6,182,212,0.5)] border border-white/10 relative overflow-hidden group">
<span class="relative z-10">Termin bestätigen</span>
<span class="material-symbols-outlined relative z-10" style="font-variation-settings: 'wght' 600;">check_circle</span>
<!-- Subtle hover/active glow effect inside button -->
<div class="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
</button>
</div>
</body></html>
